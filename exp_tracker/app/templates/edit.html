<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit</title>
</head>
<body>
  <form method="POST">

    {% csrf_token %}
    <label for="name">Expense Name</label> <br>
    <input type="text" name="name" value={{exp.name}} placeholder="eg.(food )"> <br> 

    <label for="amount">Amount</label> <br>
    <input type="number" value={{exp.amount}} name="amount" placeholder=5000..><br> 
    <br> <input type="submit" value="Save">
  </form>  
  
</body>
</html>
